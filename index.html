<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxelGen - Plotz Clone</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <h1>VoxelGen</h1>
            
            <div class="control-group">
                <label for="shape-select">Shape</label>
                <select id="shape-select">
                    <option value="helix">Helix</option>
                    <option value="paraboloid">Paraboloid</option>
                    <option value="bridge">Procedural Bridge</option>
                    <option value="house">Procedural House</option>
                    <option value="medieval_house">Medieval House</option>
                    <option value="tower">Procedural Tower</option>
                    <option value="sphere">Sphere</option>
                    <option value="ellipsoid">Ellipsoid</option>
                    <option value="cylinder">Cylinder</option>
                    <option value="cone">Cone</option>
                    <option value="torus">Torus</option>
                    <option value="circle">Circle (2D)</option>
                    <option value="ellipse">Ellipse (2D)</option>
                </select>
            </div>

            <div id="dynamic-params">
                <!-- Params will be injected here -->
            </div>

            <div class="control-group">
                <label>
                    <input type="checkbox" id="mode-shell"> Hollow
                </label>
            </div>
            
            <div class="control-group" id="wall-thickness-group" style="display: none;">
                <label for="wall-thickness">Wall Thickness</label>
                <input type="number" id="wall-thickness" value="1" min="1" step="1">
            </div>

            <div class="control-group">
                <label for="material-select">3D Material</label>
                <select id="material-select">
                    <option value="solid">Standard (Matte)</option>
                    <option value="texture">Texture (Minecraft)</option>
                    <option value="glossy">Glossy (Plastic)</option>
                    <option value="mirror">Mirror (Reflective)</option>
                    <option value="glass">Glass (Transparent)</option>
                    <option value="wireframe">Wireframe</option>
                </select>
            </div>

            <div class="control-group" id="block-type-group" style="display: none;">
                <label for="block-type-select">Block Type</label>
                <select id="block-type-select">
                    <!-- Options populated by JS -->
                </select>
            </div>

            <div class="control-group">
                <label for="background-select">3D Environment (Background)</label>
                <select id="background-select">
                    <option value="studio">Studio (Dark)</option>
                    <option value="minecraft">Minecraft (HDR)</option>
                    <option value="ludwikowice">Farmland (EXR)</option>
                    <option value="bridge_exr">Bridge (EXR)</option>
                </select>
            </div>

            <div class="control-group">
                <label>
                    <input type="checkbox" id="show-grid" checked> Show Grid
                </label>
            </div>

            <button id="btn-generate" class="primary-btn">Generate</button>

            <div class="preset-section">
                <h3>Presets</h3>
                <div class="control-group">
                    <select id="preset-select">
                        <option value="">-- Select Preset --</option>
                    </select>
                </div>
                <div style="display: flex; gap: 5px;">
                    <button id="btn-save-preset" style="flex: 1;">Save Preset</button>
                    <button id="btn-delete-preset" style="flex: 1; background: #cc3333;">Delete</button>
                </div>
            </div>

            <div class="export-section">
                <h3>Export</h3>
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <button id="btn-export-json" style="flex: 1;">JSON</button>
                    <button id="btn-export-csv" style="flex: 1;">CSV</button>
                </div>
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <button id="btn-export-obj" style="flex: 1;">OBJ</button>
                    <button id="btn-export-stl" style="flex: 1;">STL</button>
                </div>
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <button id="btn-export-schematic" style="flex: 1;" title="Classic Minecraft format">.schematic</button>
                    <button id="btn-export-mcfunction" style="flex: 1;" title="Minecraft commands">.mcfunction</button>
                </div>
                <button id="btn-copy-clip" style="width: 100%;">Copy to Clipboard</button>
            </div>
        </aside>

        <main id="workspace">
            <header id="workspace-header">
                <div class="view-toggles">
                    <button id="btn-view-2d" class="active">2D View</button>
                    <button id="btn-view-3d">3D Preview</button>
                </div>
                <div class="layer-controls" id="layer-controls">
                    <label for="layer-slider">Layer Y: <span id="layer-display">0</span></label>
                    <input type="range" id="layer-slider" min="0" max="0" value="0">
                </div>
                <div class="light-controls" id="light-controls" style="display: none;">
                    <label for="light-slider">Light: <span id="light-display">1.5</span></label>
                    <input type="range" id="light-slider" min="0" max="3" step="0.1" value="1.5">
                </div>
            </header>

            <div id="view-container">
                <div id="view-2d" class="view-panel active">
                    <canvas id="canvas-2d"></canvas>
                    <div id="hover-info">X: 0, Z: 0</div>
                </div>
                <div id="view-3d" class="view-panel">
                    <canvas id="canvas-3d"></canvas>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
